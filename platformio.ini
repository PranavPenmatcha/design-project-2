; PlatformIO — XIAO nRF52840 Sense
;
; Keep Seeed platform + *sense* board: LSM6DS3 may be on Wire1 (see wiki); OLED usually Wire D4/D5.
; Generic PlatformIO env (nordicnrf52 + board xiao_nrf52840) targets non-Sense XIAO.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_nrf52840_sense

[env:common_seeed]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino
lib_deps =
  olikraus/U8g2
  https://github.com/Seeed-Studio/Seeed_Arduino_LSM6DS3.git
monitor_speed = 115200
; Avoid host toggling DTR/RTS in ways that confuse the bootloader during development
monitor_rts = 0
monitor_dtr = 0

; Default: USB serial DFU via Adafruit nrfutil (1200-baud “touch” then ZIP upload).
[env:seeed_xiao_nrf52840_sense]
extends = env:common_seeed
upload_protocol = nrfutil
upload_speed = 115200

; If you see: "Timed out waiting for acknowledgement" / "No data received on serial port"
;   1) Close Serial Monitor and any other app using the COM/cu.usbmodem port.
;   2) Use a USB cable that supports data (not charge-only), preferably direct to the Mac.
;   3) Double-tap RESET quickly; the RGB LED should pulse in bootloader mode — upload within ~8 s.
;   4) Run upload again (many failures are intermittent USB/enumeration).
;   5) Update the Adafruit nRF52 bootloader if it is very old:
;      https://github.com/adafruit/Adafruit_nRF52_Bootloader/releases
;
; SWD upload (no USB DFU): wire SWDCLK/SWDIO/GND to a J-Link or compatible probe, install
; nRF Command Line Tools, then:
;   pio run -e seeed_xiao_nrf52840_sense_swd -t upload

[env:seeed_xiao_nrf52840_sense_swd]
extends = env:common_seeed
upload_protocol = nrfjprog
